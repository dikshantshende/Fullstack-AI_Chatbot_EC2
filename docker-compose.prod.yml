version: '3.8'

services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./backend/data:/app/data
      - vectorstore_data:/app/data/vectorstore
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - chatbot_network

  web:
    build: ./frontend
    ports: ["80:80"]
    depends_on:
      - api
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://16.16.207.191:8000/api
    networks:
      - chatbot_network

volumes:
  vectorstore_data:

networks:
  chatbot_network:
    driver: bridge
